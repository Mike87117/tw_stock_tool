name: Python Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unittest
        run: python -m unittest discover -s tests

  package-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package from repository metadata
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Smoke installed package and console entrypoint
        run: |
          python -c "import tw_stock_tool"
          python -c "from tw_stock_tool.cli import twstock_cli"
          python -m tw_stock_tool.cli.twstock_cli --help
          twstock --help
          twstock doctor --help
          twstock analyze --help
          twstock daily --help
          twstock backtest-report --help
          twstock parameter-sweep --help
          twstock walk-forward --help
